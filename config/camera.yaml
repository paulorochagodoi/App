node_role: camera

ap:
  ssid: BabyMonitor-AP
  password: babymonitor123
  ip: 10.42.0.1

fallback_wifi:
  ssid: ""
  password: ""

server:
  host: 0.0.0.0
  port: 8080

streaming:
  width: 1920
  height: 1080
  framerate: 24
  hls_dir: /tmp/hls
  hls_target_duration: 1
  hls_max_files: 3
  video_bitrate: 4000  # kbps; increase for better image quality (requires more bandwidth)
  # video_device: ""   # leave empty for auto-detect; set e.g. "/dev/video0" to pin a specific webcam
  # audio_device: ""   # leave empty for auto-detect; set e.g. "hw:1,0" to pin a specific mic

recordings:
  output_dir: /opt/babymonitor/recordings

cry_detector:
  sample_rate: 16000
  chunk_size: 2048
  threshold: 0.65
  silence_timeout: 10
